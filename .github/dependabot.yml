version: 2
updates:
  - package-ecosystem: 'npm'
    directory: '/'
    schedule:
      interval: 'weekly'
    commit-message:
      prefix: 'fix'
      prefix-development: 'chore'
      include: 'scope'
    ignore:
      # TypeScript 7 is the native port and exposes no compiler API, so
      # typescript-eslint cannot support it (peer stays typescript <6.1.0).
      # Drop this once typescript-eslint/typescript-eslint#10940 closes.
      - dependency-name: "typescript"
        update-types: ["version-update:semver-major"]
  - package-ecosystem: 'npm'
    directory: '/'
    target-branch: 'v2'
    schedule:
      interval: 'weekly'
    commit-message:
      prefix: 'fix'
      prefix-development: 'chore'
      include: 'scope'
    # v2 branch: Disable version updates, only security updates via Dependabot rules
    open-pull-requests-limit: 0
  - package-ecosystem: 'npm'
    directory: '/'
    target-branch: 'v1'
    schedule:
      interval: 'weekly'
    commit-message:
      prefix: 'fix'
      prefix-development: 'chore'
      include: 'scope'
    # v1 branch: Disable version updates, only security updates via Dependabot rules
    open-pull-requests-limit: 0
